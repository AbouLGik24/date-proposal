<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Have a Question For You... 😊</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #dbeafe 100%);
            background-color: #f0fdf4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            max-width: 450px;
            width: 90%;
            height: 450px; 
            position: relative; /* Essential: Acts as the boundary walls for the moving button */
            border: 1px solid rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        h1 {
            color: #0f172a;
            font-size: 2.2em;
            margin-top: 30px;
            margin-bottom: 10px;
            font-weight: 700;
            z-index: 2;
        }
        p {
            color: #64748b;
            font-size: 1.1em;
            margin-bottom: 20px;
            z-index: 2;
        }
        .btn-group {
            width: 100%;
            height: 250px;
            position: relative; /* Holds absolute positioned items inside safely */
            margin-top: 10px;
        }
        button {
            padding: 16px 36px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.15s ease-out;
        }
        #yesBtn {
            background-color: #10b981;
            color: white;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
            position: absolute;
            left: 50%;
            top: 40%;
            transform: translate(-50%, -50%) scale(1);
            z-index: 10; /* Keeps the green button layered over everything */
            transform-origin: center center;
        }
        #yesBtn:hover {
            background-color: #059669;
        }
        #noBtn {
            background-color: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
            position: absolute; 
            z-index: 5;
            /* Places it cleanly to the right side of the Yes button at the start */
            left: 260px; 
            top: 75px;
        }
        .status-message {
            margin-top: 40px;
            font-size: 1.2em;
            color: #475569;
            font-weight: 600;
            display: none;
            z-index: 30;
        }
    </style>
</head>
<body>

<div class="card">
    <h1 id="mainQuestion">Will you go out with me? 🏹</h1>
    <p id="subText">Think carefully...</p>
    
    <div class="btn-group" id="actionContainer">
        <button id="yesBtn" onclick="submitAnswer('Absolutely Yes!')">Yes!</button>
        <button id="noBtn" onmouseenter="dodgeAndGrow()" onclick="dodgeAndGrow()">No</button>
    </div>

    <div class="status-message" id="notification"></div>
</div>

<script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const container = document.getElementById('actionContainer');
    
    const FORMSPREE_ENDPOINT = "https://formspree.io/f/xkoabalb";

    let clickCount = 0;
    let yesScale = 1;

    const funnyTexts = [
        "Are you sure? 🤔",
        "Think again! 🥺",
        "Wrong button! 👀",
        "Don't do this to me... 💔",
        "Click the green one! 👉",
        "Just give up and say yes! 😉"
    ];

    function dodgeAndGrow() {
        clickCount++;
        
        // 1. Grow the Yes Button bigger from its center position
        yesScale += 0.4; 
        yesBtn.style.transform = `translate(-50%, -50%) scale(${yesScale})`;
        
        // 2. Teleport the No Button randomly inside the button action zone
        const containerRect = container.getBoundingClientRect();
        const btnRect = noBtn.getBoundingClientRect();

        // Calculate maximum allowed positions to keep it inside the zone layout
        const maxHorizontal = containerRect.width - btnRect.width;
        const maxVertical = containerRect.height - btnRect.height;

        const randomX = Math.floor(Math.random() * maxHorizontal);
        const randomY = Math.floor(Math.random() * maxVertical);

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";

        // 3. Update the hint text subtitle dynamically
        const subText = document.getElementById('subText');
        if (clickCount <= funnyTexts.length) {
            subText.innerHTML = funnyTexts[clickCount - 1];
        }

        // 4. If she attempts to dodge 7 times, the Yes button takes over and No vanishes
        if (clickCount >= 7) {
            noBtn.style.display = 'none';
            subText.innerHTML = "Look at that, you have no choices left! 😏";
            yesBtn.style.width = "95%";
            yesBtn.style.height = "90%";
            yesBtn.style.top = "50%";
        }
    }

    function submitAnswer(chosenOption) {
        // Clear buttons and texts instantly
        document.getElementById('actionContainer').style.display = 'none';
        document.getElementById('subText').style.display = 'none';
        
        const status = document.getElementById('notification');
        status.style.display = 'block';
        status.innerHTML = "Locking in your answer... 🔒";

        fetch(FORMSPREE_ENDPOINT, {
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                Response: chosenOption,
                AttemptsAtNo: clickCount,
                SentAt: new Date().toLocaleString()
            })
        })
        .then(res => {
            if (res.ok) {
                document.getElementById('mainQuestion').innerHTML = "Best decision ever! 🥰✨";
                status.innerHTML = `Can't wait! Check your phone, details coming soon!`;
            } else {
                status.innerHTML = "Ah, system error! Just text me your answer directly instead. 😉";
            }
        })
        .catch(() => {
            status.innerHTML = "Network glitch! Just tell me your answer in person. ✨";
        });
    }
</script>

</body>
</html>
