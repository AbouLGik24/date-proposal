<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Go Out With Me? ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe3e3 0%, #ffd1d1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #d63031;
            font-size: 2.2em;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            min-height: 100px;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        #yesBtn {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
            transition: transform 0.1s ease-out;
        }
        #noBtn {
            background-color: #e74c3c;
            color: white;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            position: absolute; /* This keeps it fully absolute to the entire screen layout */
        }
        .message {
            margin-top: 20px;
            font-size: 1.3em;
            color: #2c3e50;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="question">Will you go out with me? ❤️</h1>
    
    <div class="buttons" id="btnContainer">
        <button id="yesBtn" onclick="sendResponse('Yes')">Yes!</button>
        <button id="noBtn" onmouseover="moveButtonAndGrow()" onclick="moveButtonAndGrow()">No</button>
    </div>

    <div class="message" id="replyMessage"></div>
</div>

<script>
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    
    const FORMSPREE_URL = "https://formspree.io/f/xkoabalb";

    let clickCount = 0;
    let yesScale = 1;

    // This matches your original template exactly
    function moveButtonAndGrow() {
        clickCount++;

        // 1. Grow the Yes Button
        yesScale += 0.35;
        yesBtn.style.transform = `scale(${yesScale})`;

        // 2. Move the No Button freely anywhere on the screen layout
        const x = Math.random() * (window.innerWidth - noBtn.clientWidth);
        const y = Math.random() * (window.innerHeight - noBtn.clientHeight);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";

        // 3. Make the No button completely vanish if they work too hard trying to tap it
        if (clickCount >= 7) {
            noBtn.style.display = 'none';
        }
    }

    function sendResponse(answer) {
        document.getElementById('btnContainer').style.display = 'none';
        const msgDiv = document.getElementById('replyMessage');
        
        msgDiv.style.display = 'block';
        msgDiv.innerHTML = "Sending your answer... ✨";

        fetch(FORMSPREE_URL, {
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                decision: answer,
                attemptsAtNo: clickCount,
                timestamp: new Date().toLocaleString()
            })
        })
        .then(response => {
            if (response.ok) {
                document.getElementById('question').innerHTML = "Best decision ever! 🥰❤️";
                msgDiv.innerHTML = "Response saved successfully!";
            } else {
                msgDiv.innerHTML = "Oops! Something went wrong delivering your response.";
            }
        })
        .catch(error => {
            msgDiv.innerHTML = "Connection error.";
        });
    }
</script>

</body>
</html>
